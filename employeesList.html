<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>
    <link rel="stylesheet" href="employeesList.css">
</head>
<body>
    <div class="container">
        <h2>New Employees</h2>
        
        <div class="form-container">
            <div class="input-group">
                <label>Enter Name</label>
                <input type="text" id="name" placeholder="Enter Name">
            </div>
            <div class="input-group">
                <label>Enter Profession</label>
                <input type="text" id="profession" placeholder="Enter Profession">
            </div>
            <div class="input-group">
                <label>Enter Age</label>
                <input type="number" id="age" placeholder="Enter Age">
            </div>
        </div>

        <button id="addUserBtn">Add User</button>

        <div id="messageContainer"></div>

        <h3>Added Employees</h3>
        <div id="employeeList">
            <p class="empty-msg">Data not found</p>
        </div>
    </div>

    <script src="employeesList.js"></script>
</body>
</html>
